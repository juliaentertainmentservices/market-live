<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Live</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo">📈 MARKET LIVE</div>
    <div id="clock">UTC --:--:--</div>
</header>

<div class="layout">

    <aside>
        <h3>Markets</h3>
        <div>Crypto</div>
        <div>Stocks</div>
        <div>Forex</div>
        <div>Commodities</div>
    </aside>


    <main>

        <section class="cards">

            <div class="card">
                <h4>Bitcoin</h4>
                <p>$104,500</p>
                <span class="green">+2.3%</span>
            </div>

            <div class="card">
                <h4>Ethereum</h4>
                <p>$3,520</p>
                <span class="green">+1.8%</span>
            </div>

            <div class="card">
                <h4>S&P 500</h4>
                <p>6,900</p>
                <span class="green">+0.4%</span>
            </div>

        </section>


        <section class="chart">
            <h2>Live Market Chart</h2>
            <div class="chart-box">
                CHART AREA
            </div>
        </section>


    </main>


    <aside class="news">

        <h3>Market News</h3>

        <p>• Bitcoin market update</p>
        <p>• Stock market movement</p>
        <p>• Global economy</p>

    </aside>

</div>


<footer>
    Market Live Dashboard
</footer>


<script>
function updateClock(){
    let now = new Date();
    document.getElementById("clock").innerHTML =
    "UTC " + now.toUTCString().split(" ")[4];
}

setInterval(updateClock,1000);
updateClock();
</script>

</body>
</html>
