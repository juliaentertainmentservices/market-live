<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>World Market Live</title>

<link rel="stylesheet" href="style.css">

</head>

<body>
<h1>WORLD MARKET LIVE</h1>

<div id="clock"></div>

<div class="container">

    <div class="left">

        <div class="box">
            Crypto Market
        </div>

        <div class="box">
            Stock Market
        </div>

        <div class="box">
            Forex
        </div>

    </div>

    <div class="center">

        <div class="bigbox">

            Live Chart

        </div>

    </div>

    <div class="right">

        <div class="box">
            Heat Map
        </div>

        <div class="box">
            News
        </div>

        <div class="box">
            Calendar
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
