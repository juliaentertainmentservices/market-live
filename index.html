<h1>WORLD MARKET LIVE</h1>

<div id="clock"></div>

<script type="module" src="https://widgets.tradingview-widget.com/w/en/tv-ticker-tape.js"></script>

<tv-ticker-tape symbols="FOREXCOM:SPXUSD,FOREXCOM:NSXUSD,FOREXCOM:DJI,FX:EURUSD,BITSTAMP:BTCUSD,BITSTAMP:ETHUSD,CMCMARKETS:GOLD"></tv-ticker-tape>

    <div class="left">

        <div class="box">
            <!-- TradingView Widget BEGIN -->
<div class="tradingview-widget-container">
  <div class="tradingview-widget-container__widget"></div>

  <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-screener.js" async>

  "defaultColumn": "overview",
  "screener_type": "crypto_mkt",
  "displayCurrency": "USD",
  "colorTheme": "light",
  "isTransparent": false,
  "locale": "en",
  "width": "100%",
  "height": 550
}
  </script>
</div>
<!-- TradingView Widget END -->
        </div>

        <div class="box">
            <script type="module" src="https://widgets.tradingview-widget.com/w/en/tv-market-overview.js"></script>

        <div class="box">

    </div>
